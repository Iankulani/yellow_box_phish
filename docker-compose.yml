version: '3.8'

services:
  yellowbox:
    build: .
    container_name: yellow_box_phish
    hostname: yellowbox
    restart: unless-stopped
    ports:
      - "8080:8080"           # Web UI
      - "8081-8090:8081-8090" # Phishing servers range
    volumes:
      - ./data:/app/.yellow_box_phish
      - ./reports:/app/reports
      - ./config:/app/config
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - YELLOWBOX_ENV=production
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    shm_size: 2gb
    networks:
      - yellowbox_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  yellowbox_network:
    driver: bridge

volumes:
  data:
  reports:
  config:
  logs: